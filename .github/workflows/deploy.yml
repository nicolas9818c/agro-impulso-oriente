name: Build y Deploy a Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm install

      - name: Construir el sitio
        run: npm run build --prefix apps/web
        env:
          NODE_ENV: production
          VITE_POCKETBASE_URL: https://yes-tall.pockethost.io
          VITE_WOMPI_PUBLIC_KEY: ${{ secrets.VITE_WOMPI_PUBLIC_KEY }}

      - name: Agregar .htaccess
        run: |
          cat > dist/apps/web/.htaccess << 'HTEOF'
RewriteEngine On
RewriteBase /
AddType application/javascript .js
AddType text/css .css
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule ^ index.html [QSA,L]

# Deshabilitar LSCache y cache de navegador para HTML y assets JS/CSS
# Esto garantiza que cada deploy sea visible inmediatamente
<FilesMatch "\.(html|js|css)$">
  Header always set Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
  Header always set Pragma "no-cache"
  Header always set Expires "0"
  Header always set X-LiteSpeed-Cache-Control "no-cache"
</FilesMatch>
HTEOF

      - name: Sobrescribir bundles que Horizons referencia
        run: |
          # Horizons sirve su propio index.html con referencias FIJAS a los
          # bundles originales (index-Bz1oLENb.js / index-D1uVZyrS.css).
          # Copiamos el output nuevo a esos nombres para que Horizons cargue
          # siempre el código más reciente sin necesitar editar su index.html.
          MAIN_JS=$(ls dist/apps/web/assets/index-*.js 2>/dev/null | head -1)
          MAIN_CSS=$(ls dist/apps/web/assets/index-*.css 2>/dev/null | head -1)
          echo "Bundle nuevo JS : $MAIN_JS"
          echo "Bundle nuevo CSS: $MAIN_CSS"
          [ -n "$MAIN_JS"  ] && cp "$MAIN_JS"  dist/apps/web/assets/index-Bz1oLENb.js
          [ -n "$MAIN_CSS" ] && cp "$MAIN_CSS" dist/apps/web/assets/index-D1uVZyrS.css
          echo "Aliases creados:"
          ls -lh dist/apps/web/assets/

      - name: Subir a Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/apps/web/
          server-dir: /dominios/agroimpulsooriente.store/public_html/
          dangerous-clean-slate: true
          timeout: 60000
